<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>INTELKHAT</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image"></script>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  text-align: center;
  padding: 40px;
}

.card {
  background: white;
  max-width: 500px;
  margin: auto;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #007bff;
  color: white;
  cursor: pointer;
}

img {
  margin-top: 20px;
  max-width: 100%;
  border-radius: 12px;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: #eaf4ff;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="card">
  <h1>INTELKHAT</h1>
  <p>AI Khat Recognition System</p>

  <input type="file" id="upload" accept="image/*"><br><br>
  <button onclick="predict()">Detect Khat</button>

  <img id="preview" style="display:none;">
  
  <div class="result" id="result">
    Result will appear here
  </div>
</div>

<script>
const MODEL_URL = "./model/";
let model;

// load model
async function loadModel() {
  model = await tmImage.load(
    MODEL_URL + "model.json",
    MODEL_URL + "metadata.json"
  );
  document.getElementById("result").innerHTML = "Model loaded ✅";
}
loadModel();

// preview image
document.getElementById("upload").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if(file){
    const img = document.getElementById("preview");
    img.src = window.URL.createObjectURL(file); // 🔥 FIX sini
    img.style.display = "block";
  }
});

// predict
async function predict() {
  const img = document.getElementById("preview");

  if(!img.src){
    document.getElementById("result").innerHTML = "Upload image first";
    return;
  }

  const predictions = await model.predict(img);
  predictions.sort((a,b)=>b.probability - a.probability);

  const top = predictions[0];

  document.getElementById("result").innerHTML =
    `<b>${top.className}</b><br>${(top.probability*100).toFixed(2)}%`;
}
</script>

</body>
</html>
