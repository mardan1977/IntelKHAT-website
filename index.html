<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INTELKHAT</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f7f7f7;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
    }
    img {
      max-width: 100%;
      margin-top: 20px;
      border-radius: 12px;
    }
    .result {
      margin-top: 20px;
      padding: 16px;
      background: #eef6ff;
      border-radius: 12px;
    }
    .prediction-item {
      margin: 8px 0;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }
    input {
      margin-top: 10px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>INTELKHAT</h1>
    <p>Upload gambar tulisan khat untuk kenal pasti jenis khat.</p>

    <input type="file" id="imageUpload" accept="image/*" />
    <br>
    <button onclick="predictImage()">Detect Khat</button>

    <div>
      <img id="preview" src="" alt="" style="display:none;" />
    </div>

    <div class="result" id="result">
      Result will appear here.
    </div>
  </div>

  <script>
    const URL = "./model/";
    let model;

    async function loadModel() {
      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";
      model = await tmImage.load(modelURL, metadataURL);
      document.getElementById("result").innerHTML = "Model loaded successfully.";
    }

    window.onload = loadModel;

    document.getElementById("imageUpload").addEventListener("change", function(event) {
      const file = event.target.files[0];
      if (file) {
        const img = document.getElementById("preview");
        img.src = URL.createObjectURL(file);
        img.style.display = "block";
      }
    });

    async function predictImage() {
      const img = document.getElementById("preview");

      if (!img.src || !model) {
        document.getElementById("result").innerHTML = "Please upload image first or wait for model to finish loading.";
        return;
      }

      const predictions = await model.predict(img);

      predictions.sort((a, b) => b.probability - a.probability);

      let output = "<h3>Prediction Result</h3>";
      predictions.forEach(pred => {
        output += `<div class="prediction-item"><b>${pred.className}</b>: ${(pred.probability * 100).toFixed(2)}%</div>`;
      });

      output += `<hr><p><b>Top prediction:</b> ${predictions[0].className}</p>`;
      document.getElementById("result").innerHTML = output;
    }
  </script>
</body>
</html>
